# ====================
# CLEAR 2026 690 nm reflection reconstruction - cam3 input, cam2 target
# v2 "shape-normalized" pipeline - 2026-07-24
#
# WHY v2 (evidence in AI_Workspace/CLEAR26_690_fix/REPORT.md):
#   Run 690_cam3-20260723134626_with_prior converged to centroid MAE
#   0.030/0.047 with ring-shaped hedging, yet a plain ridge regression on
#   per-sample-normalized 64x64 inputs decodes position to 0.023 MAE
#   (azimuthal 0.020) on the same eval split - a linear baseline beat the
#   CAE. At 405 the same CAE beat ridge 3x. Conclusion: the information is
#   present; the training formulation hides it. Reflection inputs are
#   near-identical donuts (pairwise corr 0.72-0.99) whose overall intensity
#   varies ~8x across basis/eval frames - the network spends its capacity
#   on brightness, not on the ~4%-RMS angular modulations.
#
# v2 CHANGES vs CLEAR26_690_cam3:
#   1. NEW MODULE - per-sample L2 normalization of BOTH input and target,
#      applied POST-COMBINATION ONLY (combinator.transforms) and mirrored in
#      the eval chain via data.eval_extra_transforms (utils.py hook added
#      2026-07-24; data.transforms itself is shared with BASIS CACHING and
#      must stay normalization-free - an earlier draft of this file put the
#      L2 there, which would have per-basis-normalized the cached basis,
#      re-weighted the mixture, broken the sensor-noise count calibration,
#      and erased the reflection field's real spatial nonuniformity. Caught
#      in review 2026-07-24.). Executed train graph now matches the probe:
#      calibrated raw basis -> combine -> sensor noise (counts) -> L2 ->
#      scale. Normalized synth/eval peaks match (input 0.016-0.017 vs
#      0.017; target 0.028-0.031 vs 0.031); ridge on this representation
#      decodes eval position to MAE 0.023 (azimuthal 0.020).
#   2. Post-normalization scales k_in=24, k_tgt=16 put peaks at the proven
#      405 operating point (input ~0.40, target ~0.50) with p99.5 < 0.95.
#   3. SGM prior: intensity_range [0.004, 0.018] (strictly positive). This
#      is a REQUIRED guard, not an optimization: l2_normalize divides by
#      max(||y||, eps), so a near-empty legacy pattern (~10% per Gaussian)
#      would be amplified into a saturated garbage sample. Side effect
#      (verified by prior probe 2026-07-24): all 3 Gaussians always live,
#      normalized target peaks stay in range, no empties.
#   4. NO sgm_validator: with the positive prior it is redundant, it was
#      never probe-exercised, and enabling it disables the batched
#      generation fast path.
#   5. Dropout kept OFF (ablation arm A carried over).
#   NOTE transform typing: in combinator.transforms the input slot receives
#   a torch tensor (from torch_sensor_noise) -> torch_l2_normalize; the
#   target slot receives numpy -> numpy 'l2_normalize'. In
#   eval_extra_transforms both slots are tensors -> torch_l2_normalize.
#   Sensor noise stays BEFORE normalization (physical order: camera noise
#   lives in counts; count_scale 2200 with basis scale 0.31 keeps the
#   count-domain mapping calibrated).
# Run with: EXPERIMENT_CONFIG=CLEAR26_690_cam3_v2
# ====================

seed: &seed 42
name: &config "CLEAR26_690_cam3_v2.yaml"
framework: "pytorch"
file_extract: False
note: |
  v2 shape-normalized pipeline. Train on 690_reflection_large_256, cam3
  fiber -> cam2 screen, evaluate on 690_realbeam_256. Input and target are
  L2-normalized per sample (post-combination / in eval chain), making the
  task intensity-invariant; eval metrics (centroid, width) are unaffected.
  Beam prior kept at 70/30 via the ROI>=0.80 eval query.

paths:
  output: ${paths.output_root}
  processed_690_background: ${paths.datasets.processed_690_background_256}
  processed_690_reflection_large: ${paths.datasets.processed_690_reflection_large_256}
  processed_690_realbeam_256: ${paths.datasets.processed_690_realbeam_256}

model:
  name: "CAE"
  in_channels: 1
  out_channels: 1
  kernel_size: 4
  encoder:          [64,   128, 128, 256, 512, 1024]
  decoder:          [1024, 512, 256, 128, 128, 64  ]
  apply_batchnorm:  [0,    1,   1,   1,   1,   1   ]
  # Ablation arm A carried over from CLEAR26_690_cam3 (see its comments).
  apply_dropout:    [0,    0,   0,   0,   0,   0   ]
  final_activation: sigmoid

sql:
  clear26_690_cam3_to_cam2_basis: |
    SELECT
      a.png_path || '|' || b.png_path AS image_pair,
      a.sample_id,
      a.run_id
    FROM images a
    JOIN images b
      ON a.sample_id = b.sample_id
     AND a.run_id = b.run_id
    WHERE a.camera = 'cam3'
      AND b.camera = 'cam2'
      AND a.png_path IS NOT NULL
      AND b.png_path IS NOT NULL
      AND a.stat_max > 0
      AND a.stat_sum > 0
      AND b.roi_energy_fraction >= 0.55
      AND abs(a.sync_time_ns - b.sync_time_ns) <= 1000000
    ORDER BY a.sample_id;

  clear26_690_cam3_to_cam2_eval: |
    SELECT
      a.png_path || '|' || b.png_path AS image_pair,
      a.sample_id,
      a.run_id
    FROM images a
    JOIN images b
      ON a.sample_id = b.sample_id
     AND a.run_id = b.run_id
    WHERE a.camera = 'cam3'
      AND b.camera = 'cam2'
      AND a.png_path IS NOT NULL
      AND b.png_path IS NOT NULL
      AND a.stat_max > 0
      AND a.stat_sum > 0
      AND b.roi_energy_fraction >= 0.80
      AND abs(a.sync_time_ns - b.sync_time_ns) <= 1000000
    ORDER BY a.sample_id;

simulation:
  canvas_size: [256, 256]
  total_Guassian_num: 3
  max_pixel_value: 1.0
  max_intensity: 0.018
  area_boost_scale: 0.000352941176470588
  max_peak_intensity: null
  minimum_pixel_threshold: 0.02
  fade_rate: 0.10
  std_1: 0.05
  std_2: 0.10
  distribution: "other"
  # v2: strictly positive intensity - REQUIRED under per-sample
  # normalization (near-empty patterns would be eps-amplified into
  # saturated garbage). Known side effect: all 3 Gaussians are always
  # live (legacy averaged ~2.7), a mild morphology shift - measured
  # acceptable by probe_v2_prior (see CLEAR26_690_fix/REPORT.md).
  intensity_range: [0.004, 0.018]
  process_functions:
    - name: "resize"
      params:
        size: [34, 34]
        interpolation: "area"
    - name: "shrink_to_canvas"
      params:
        scale: 0.95
        fill: 0.0
        interpolation: "area"

# v2: validator intentionally ABSENT. The strictly positive intensity_range
# already prevents the degenerate near-empty samples that normalization
# would amplify, and the validator would disable the batched-generation
# fast path while adding an unprobed ingredient.

training:
  epochs: &epochs 100
  learning_rate: 1.0e-4
  batch_size: &batch 32

callbacks:
  - name: "torch_batch_progress_bar"
    params:
      only_keys: ["train_loss", "val_loss"]
  - name: "torch_early_stopping"
    params:
      monitor: "val_loss"
      patience: 20
  - name: "torch_image_reconstruction_callback"
    params:
      save_dir: ${paths.output}
      include_training_images: True

dataset_structure:
  db: "dataset.db"

data:
  pipeline_case: spatial_nearest_combinator
  dataset_sources: ["processed_690_reflection_large", "processed_690_realbeam_256"]
  train_sql_key: clear26_690_cam3_to_cam2_basis
  eval_sql_key: clear26_690_cam3_to_cam2_eval
  # Beam-prior patterns from the ROI>=0.80 eval query (see CLEAR26_690_cam3).
  pattern_sql_key: clear26_690_cam3_to_cam2_eval
  provider_output_column: image_pair
  total_train_samples: 5000
  val_test_split: 0.5
  input_shape: &inp [256, 256]
  output_shape: &out [256, 256]
  transforms:
    torch:
      - name: "split_text"
        params:
          separator: "|"
      - name: "multi_transform"
        params:
          transforms:
            - name: "add_parent_dir"
            - name: "add_parent_dir"
      - name: "multi_transform"
        params:
          transforms:
            - name: "load_image16"
            - name: "load_image16"
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_to_tensor"
            - name: "torch_to_tensor"
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_subtract_background"
              params:
                background_source: ${paths.processed_690_background}
                camera: "cam3"
                clip_min: 0.0
            - name: "torch_subtract_background"
              params:
                background_source: ${paths.processed_690_background}
                camera: "cam2"
                clip_min: 0.0
      # Count normalizers unchanged (calibrated 2026-07-22, verified 07-23).
      # IMPORTANT: this data.transforms chain is ALSO the basis-caching
      # chain (utils.py extends it with basis_transforms). It must contain
      # NO per-sample normalization - basis frames enter the combinator in
      # calibrated raw units so mixture weighting, the reflection field's
      # spatial nonuniformity, and the sensor-noise count mapping stay
      # physical. Per-sample normalization lives in combinator.transforms
      # (train) and eval_extra_transforms (eval) ONLY.
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_remap_range"
              params:
                current_min: 0.0
                current_max: 2200.0
            - name: "torch_remap_range"
              params:
                current_min: 0.0
                current_max: 500.0
  # v2: appended ONLY to the eval/val/test chain by the utils.py hook -
  # mirrors combinator.transforms so train and eval live in the same
  # normalized space. Both slots are torch tensors here.
  eval_extra_transforms:
    torch:
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_l2_normalize"
            - name: "torch_l2_normalize"
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_scale"
              params:
                scale_factor: 24.0
            - name: "torch_scale"
              params:
                scale_factor: 16.0
  basis_transforms:
    torch:
      - name: "multi_transform"
        params:
          transforms:
            - null
            - name: "torch_render_centroid_kernel"
              params:
                sigma: 8.0
      # Kept from the 07-23 recalibration: 0.31 keeps the sensor-noise
      # count-domain mapping honest; 1.18 is inert under target L2 norm
      # but kept so pre-normalization diagnostics stay comparable.
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_scale"
              params:
                scale_factor: 0.31
            - name: "torch_scale"
              params:
                scale_factor: 1.18
  dataset_ops:
    - name: "torch_batch"
      params:
        batch_size: *batch
        shuffle: True
        num_workers: 0
        prefetch_factor: 2
        seed: *seed

combinator:
  jitter_mode: global_cell
  jitter_alpha: 1.0
  generation_batch_size: *batch
  clip_output: [0.0, 1.0]
  transforms:
    torch:
      # Physical order: sensor noise in counts FIRST, then normalization.
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_sensor_noise"
              params:
                a: 0.118
                b: 4.82
                count_scale: 2200.0
                param_jitter: 2.0
                gain: null
                clip_min: 0.0
            - null
      # v2 per-sample normalization. Type note: input slot receives a torch
      # tensor (from torch_sensor_noise) -> torch_l2_normalize; target slot
      # receives numpy from the combinator -> numpy 'l2_normalize'.
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_l2_normalize"
            - name: "l2_normalize"
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_scale"
              params:
                scale_factor: 24.0
            - name: "torch_scale"
              params:
                scale_factor: 16.0

image_generator:
  cache_transformed: true
  transforms:
    - name: "split_text"
      params:
        separator: "|"
    - name: "tuple_select"
      params:
        index: 1
    - name: "add_parent_dir"
    - name: "load_image"
    - name: "to_narray"
    - name: "to_grayscale"
    - name: "subtract_background"
      params:
        background_source: ${paths.processed_690_background}
        camera: "cam2"
        clip_min: 0.0
    - name: "resize"
      params:
        size: [34, 34]
        interpolation: "area"
    - name: "remap_range"
      params:
        current_min: 0.0
        current_max: 4095.0
        target_min: 0.0
        target_max: 1.0
    - name: "shrink_to_canvas"
      params:
        scale: 1.0
        fill: 0.0
        interpolation: "bilinear"

weighted_stream:
  real_weight: 0.7
  sgm_weight: 0.3

extra_files: ["models/CAE.py"]
