# ====================
# CLEAR 2026 690 nm reflection reconstruction - cam3 input, cam2 target
# Derived from CLEAR26_cam3; model and training workflow are unchanged.
# Calibrated on 2026-07-22:
#   reflection basis ROI>=0.55: 1764 pairs; realbeam eval ROI>=0.80:
#   570 pairs -> 285 validation / 285 test.
#   Eval peak p99.5/max: cam3 1969.9/2092.5 -> /2200;
#   cam2 448.8/481.8 -> /500.
#   Across three 1024-sample production-stream probes, sigma=8 and basis
#   scales 0.65/2.70 gave mean synth/real ratios: energy 1.032,
#   peak 1.002, footprint 0.958.
# Run with: EXPERIMENT_CONFIG=CLEAR26_690_cam3
# ====================

seed: &seed 42
name: &config "CLEAR26_690_cam3.yaml"
framework: "pytorch"
file_extract: False
note: |
  Train on 690_reflection_large_256, cam3 fiber -> cam2 screen, and evaluate
  on 690_realbeam_256. SQL pairs cameras by sample_id/run_id and emits
  "input_path|target_path". As in CLEAR26_cam3, the 70/30 pattern stream also
  reads cam2 coefficient maps from the second dataset; validation and test
  image pairs are split separately from its stricter eval query.

paths:
  output: ${paths.output_root}
  processed_690_background: ${paths.datasets.processed_690_background_256}
  processed_690_reflection_large: ${paths.datasets.processed_690_reflection_large_256}
  processed_690_realbeam_256: ${paths.datasets.processed_690_realbeam_256}

model:
  name: "CAE"
  in_channels: 1
  out_channels: 1
  kernel_size: 4
  encoder:          [64,   128, 128, 256, 512, 1024]
  decoder:          [1024, 512, 256, 128, 128, 64  ]
  apply_batchnorm:  [0,    1,   1,   1,   1,   1   ]
  apply_dropout:    [1,    1,   0,   0,   0,   0   ]
  final_activation: sigmoid

sql:
  clear26_690_cam3_to_cam2_basis: |
    SELECT
      a.png_path || '|' || b.png_path AS image_pair,
      a.sample_id,
      a.run_id
    FROM images a
    JOIN images b
      ON a.sample_id = b.sample_id
     AND a.run_id = b.run_id
    WHERE a.camera = 'cam3'
      AND b.camera = 'cam2'
      AND a.png_path IS NOT NULL
      AND b.png_path IS NOT NULL
      AND a.stat_max > 0
      AND a.stat_sum > 0
      AND b.roi_energy_fraction >= 0.55
      AND abs(a.sync_time_ns - b.sync_time_ns) <= 1000000
    ORDER BY a.sample_id;

  clear26_690_cam3_to_cam2_eval: |
    SELECT
      a.png_path || '|' || b.png_path AS image_pair,
      a.sample_id,
      a.run_id
    FROM images a
    JOIN images b
      ON a.sample_id = b.sample_id
     AND a.run_id = b.run_id
    WHERE a.camera = 'cam3'
      AND b.camera = 'cam2'
      AND a.png_path IS NOT NULL
      AND b.png_path IS NOT NULL
      AND a.stat_max > 0
      AND a.stat_sum > 0
      AND b.roi_energy_fraction >= 0.80
      AND abs(a.sync_time_ns - b.sync_time_ns) <= 1000000
    ORDER BY a.sample_id;

simulation:
  canvas_size: [256, 256]
  # Minimal retune of the legacy 3-Gaussian prior to 690 nm cam2 coefficient
  # maps (34x34): mean peak 0.059 vs 0.060 real, sum 1.99 vs 2.52, and
  # 44 vs 40 active cells above 0.02. The rendered production mixture is
  # calibrated below by the target kernel and basis scales.
  total_Guassian_num: 3
  max_pixel_value: 1.0
  max_intensity: 0.018
  area_boost_scale: 0.000352941176470588
  max_peak_intensity: null
  minimum_pixel_threshold: 0.02
  fade_rate: 0.10
  std_1: 0.05
  std_2: 0.10
  distribution: "other"
  process_functions:
    - name: "resize"
      params:
        size: [34, 34]
        interpolation: "area"
    - name: "shrink_to_canvas"
      params:
        scale: 0.95
        fill: 0.0
        interpolation: "area"

training:
  epochs: &epochs 100
  learning_rate: 1.0e-4
  batch_size: &batch 32

callbacks:
  - name: "torch_batch_progress_bar"
    params:
      only_keys: ["train_loss", "val_loss"]
  - name: "torch_early_stopping"
    params:
      monitor: "val_loss"
      patience: 20
  - name: "torch_image_reconstruction_callback"
    params:
      save_dir: ${paths.output}
      include_training_images: True

dataset_structure:
  db: "dataset.db"

data:
  pipeline_case: spatial_nearest_combinator
  dataset_sources: ["processed_690_reflection_large", "processed_690_realbeam_256"]
  train_sql_key: clear26_690_cam3_to_cam2_basis
  eval_sql_key: clear26_690_cam3_to_cam2_eval
  pattern_sql_key: clear26_690_cam3_to_cam2_basis
  provider_output_column: image_pair
  total_train_samples: 5000
  val_test_split: 0.5
  input_shape: &inp [256, 256]
  output_shape: &out [256, 256]
  transforms:
    torch:
      - name: "split_text"
        params:
          separator: "|"
      - name: "multi_transform"
        params:
          transforms:
            - name: "add_parent_dir"
            - name: "add_parent_dir"
      # load_image16: PIL-based deterministic 16-bit decode, (1,H,W) int counts;
      # raises on a silent 8-bit source.
      - name: "multi_transform"
        params:
          transforms:
            - name: "load_image16"
            - name: "load_image16"
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_to_tensor"
            - name: "torch_to_tensor"
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_subtract_background"
              params:
                background_source: ${paths.processed_690_background}
                camera: "cam3"
                clip_min: 0.0
            - name: "torch_subtract_background"
              params:
                background_source: ${paths.processed_690_background}
                camera: "cam2"
                clip_min: 0.0
      # p99.5 of background-subtracted realbeam eval peaks plus margin:
      # cam3 1969.9 -> 2200; cam2 448.8 -> 500. One fixed constant per camera
      # preserves intensity linearity across basis/train/validation/test.
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_remap_range"
              params:
                current_min: 0.0
                current_max: 2200.0
            - name: "torch_remap_range"
              params:
                current_min: 0.0
                current_max: 500.0
  basis_transforms:
    torch:
      # The energy-preserving centroid kernel fills gaps in the sparse 690 nm
      # basis rendering. Sigma 8 matches rendered peak/footprint without
      # changing per-basis target energy.
      - name: "multi_transform"
        params:
          transforms:
            - null
            - name: "torch_render_centroid_kernel"
              params:
                sigma: 8.0
      # Full-pipeline calibration: input 0.65 corrects the measured 0.60/0.92
      # estimate; target 2.70 with sigma 8 gives 1.03x mean real energy over
      # three independent 1024-sample production-stream probes.
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_scale"
              params:
                scale_factor: 0.65
            - name: "torch_scale"
              params:
                scale_factor: 2.70
  dataset_ops:
    - name: "torch_batch"
      params:
        batch_size: *batch
        shuffle: True
        num_workers: 0
        prefetch_factor: 2
        seed: *seed

combinator:
  jitter_mode: global_cell
  jitter_alpha: 1.0
  generation_batch_size: *batch
  clip_output: [0.0, 1.0]
  transforms:
    torch:
      # Same cam3 acquisition settings as 405 nm: retain the measured camera
      # model a=0.118, b=4.82 and update only count_scale to the /2200
      # normalizer. Temporal dark variance was also comparable (1.86 vs 1.61).
      - name: "multi_transform"
        params:
          transforms:
            - name: "torch_sensor_noise"
              params:
                a: 0.118
                b: 4.82
                count_scale: 2200.0
                param_jitter: 2.0
                gain: null
                clip_min: 0.0
            - name: "torch_clip_range"
              params:
                clip_min: 0.0
                clip_max: 1.0

image_generator:
  cache_transformed: true
  transforms:
    - name: "split_text"
      params:
        separator: "|"
    - name: "tuple_select"
      params:
        index: 1
    - name: "add_parent_dir"
    - name: "load_image"
    - name: "to_narray"
    - name: "to_grayscale"
    - name: "subtract_background"
      params:
        background_source: ${paths.processed_690_background}
        camera: "cam2"
        clip_min: 0.0
    - name: "resize"
      params:
        size: [34, 34]
        interpolation: "area"
    - name: "remap_range"
      params:
        # Coefficient maps are raw Mono12 data, so this intentionally remains
        # /4095 rather than using the train/eval remap constants above.
        current_min: 0.0
        current_max: 4095.0
        target_min: 0.0
        target_max: 1.0
    - name: "shrink_to_canvas"
      params:
        scale: 1.0
        fill: 0.0
        interpolation: "bilinear"

weighted_stream:
  # Unchanged CLEAR26_cam3 production semantics.
  real_weight: 0.7
  sgm_weight: 0.3

extra_files: ["models/CAE.py"]
