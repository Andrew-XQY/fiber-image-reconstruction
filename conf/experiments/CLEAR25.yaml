#     - name: "resize"                           # Resize to match input dimensions
#       params:
#         size: [25, 25]                         # convient for next step (orthognal basis) to decompose the image.
#         interpolation: "bilinear"

# simulation:
#   canvas_size: [256, 256]                                                  
#   total_Guassian_num: 5                        # SGM total number of Guassian components
#   max_intensity: 1                             # Max intensity for each Guassian component
#   minimum_pixel_threshold: 10.0                 # Cut off background level, below this value will be set to 0
#   fade_rate: 0.5                                # Controls how many active Guassian compoents in a probablistic way
#   std_1: 0.015                                  # Guassian std lower bound
#   std_2: 0.03                                   # Guassian std upper bound
#   distribution: "other" 
#   process_functions:                           # before the 
#     - name: "remap_range"                      # Normalize pixel values to [0,1]
#     - name: "resize"                           # Resize to match input dimensions
#       params:
#         size: [23, 23]                         # convient for next step (orthognal basis) to decompose the image.
#         interpolation: "bilinear"

simulation:
  canvas_size:
  - 256
  - 256
  total_Guassian_num: 100
  max_intensity: 100
  minimum_pixel_threshold: 5.0
  fade_rate: 0.97
  std_1: 0.015
  std_2: 0.08
  distribution: other
  process_functions:
  - name: remap_range
  - name: resize
    params:
      size:
      - 32
      - 32
      interpolation: bilinear




training:
  epochs: &epochs 100                           # Number of full passes over training data
  learning_rate: 1.0e-4                         # Initial learning rate for optimizer
  batch_size: &batch 32                         # Number of samples per gradient update

callbacks:
  - name: "torch_batch_progress_bar"
    params:
      only_keys: ["train_loss", "val_loss"]
  - name: "torch_early_stopping"                # Factory key for early stopping
    params:
      monitor: "val_loss"                       # Metric to monitor
      patience: 20                              # Epochs to wait before stopping
  - name: "torch_image_reconstruction_callback"
    params:
      save_dir: ${paths.output}                 # Directory to save results 
      include_training_images: True             # Whether to include training images in the output

dataset_structure:
  db: "/db/dataset_meta.db"                     # Path to the SQLite database containing dataset metadata


data:
  total_train_samples: 5000       
  total_val_samples: 1000              
  train_val_split: 0.9                          # Train/validation split ratio 90/10
  val_test_split: 0.5                           # Validation/test split ratio 50/50
  input_shape: &inp [256, 256]                  # Speckle image dimensions [H, W]
  output_shape: &out [256, 256]                 # Input pattern size [H, W]
  transforms:
    torch:
      - name: "add_parent_dir"                  # Add parent directory to image paths from SQL query
        params: 
          parent_dir: null                      # This should be the directory where the images are stored after extraction
      - name: "torch_load_image"                # Load the image based on file path
      - name: "torch_to_tensor"                 # Convert to tensor
      - name: "torch_remap_range"               # Normalize pixel values to [0,1]               
      - name: "torch_split_width"               # Split image into left/right halves on width
        params:
          swap: True       

  dataset_ops:                                  # Dataset level operations
    - name: "torch_batch"                       # Batch images
      params:
        batch_size: *batch                      # Number of images per batch
        shuffle: True                           # Shuffle dataset
        num_workers: 0                          # Number of worker threads for data loading
        prefetch_factor: 2                      # Number of batches to prefetch
        seed: *seed                             # Random seed for reproducibility


lab_data:                   
  transforms:                                   # CERN optical lab used training setup, scale_factor specifically tuned based on the cameras params
    torch:
      - name: "add_parent_dir"                  
        params: 
          parent_dir: null                      # This should be the directory where the images are stored after extraction
      - name: torch_load_image
      - name: torch_to_tensor
      - name: torch_remap_range
      - name: torch_split_width
        params:
          swap: true
      - name: multi_transform
        params:
          transforms:
          - name: torch_scale
            params:
              scale_factor: 0.159
          - name: identity


inference:                                      # carry meta information of each sample for hooks use during inference, other processing follows exactly the same as training
  transforms:
    torch:
    - name: "split_copies"                      # Duplicate and distribute the input into multiple copies for parallel downstream application
      params:
        num_copies: 2                        
    - name: "multi_transform"                
      params:
        transforms:
          - name: "add_parent_dir"   
            params:
              parent_dir: null  
          - name: "extract_filename"            # One more signal line to pass through the potential sample meta data and expose to hooks.
            params:
              with_extension: True
    - name: "multi_transform"                
      params:
        transforms:
          - name: "torch_load_image"   
          - name: "identity"        
    - name: "multi_transform"                
      params:
        transforms:
          - name: "torch_to_tensor"   
          - name: "identity"        
    - name: "multi_transform"                
      params:
        transforms:
          - name: "torch_remap_range"   
          - name: "identity"        
    - name: "multi_transform"                
      params:
        transforms:
          - name: "torch_split_width"   
            params:
              swap: True
          - name: "identity"        



combinator:
  transforms:                                   # this is for the output from data augmentation using basis
    torch:
      - name: "multi_transform"                
        params:
          transforms:
            - name: "torch_clip_range"   
              params:
                clip_min: 0
                clip_max: 1
            - name: "torch_clip_range"        
              params:
                clip_min: 0
                clip_max: 1
                

                
extra_files: ["models/CAE.py"]