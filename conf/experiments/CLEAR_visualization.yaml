# ====================
# Conv AutoEncoder fiber image reconstruction configuration file
# ====================

seed: &seed 42                                  # 42, 168, 500
name: &config "CLEAR_visualization.yaml"
framework: "pytorch"
file_extract: False
note: |
  Visualization of dataset latent space.

paths:
  output: ${paths.output_root}                  # Comes from shared defaults
  clear_yag: ${paths.datasets.clear_yag}          # Picked by machine profile
  clear_laser: ${paths.datasets.clear_laser} 
  clear_chromox_wednesday: ${paths.datasets.clear_chromox_wednesday}
  clear_chromox_friday: ${paths.datasets.clear_chromox_friday}
  clear_chromox_saturday: ${paths.datasets.clear_chromox_saturday}
  processed_pure_dmd: ${paths.datasets.processed_pure_dmd}
  clear_2022: ${paths.datasets.clear_2022}

  processed_dmd: ${paths.datasets.processed_dmd}
  processed_chromox: ${paths.datasets.processed_chromox}
  processed_yag: ${paths.datasets.processed_yag}
  processed_chromox_laser: ${paths.datasets.processed_chromox_laser}
  processed_yag_laser: ${paths.datasets.processed_yag_laser}

  processed_chromox_cropped: ${paths.datasets.processed_chromox_cropped}


model:
  name: "CAE"                             # Factory key for model architecture
  in_channels: 1
  out_channels: 1
  kernel_size: 4
  encoder:          [64,  128, 128, 256, 512, 512]      # 256 -> 128 -> 64 -> 32 -> 16 -> 8
  decoder:          [512, 512, 256, 128, 128, 64 ]
  apply_batchnorm:  [0,   1,   1,   1,   1,   1  ]
  apply_dropout:    [1,   1,   0,   0,   0,   0  ]
  final_activation: sigmoid


sql:
  chromox_all: |
    SELECT image_path
    FROM mmf_dataset_metadata
  chromox_line_scan: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE purpose = 'real beam orthogonal acquisition'
      AND is_saturated_ground_truth = 0
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
      AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0;
  chromox_random_scan: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE purpose = 'testset'
      AND is_saturated_ground_truth = 0
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
      AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0;

  yag_all: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE is_saturated_ground_truth = 0
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 150000
      AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 150000
  yag_line_scan: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE comments LIKE '%otrh scan%'
  yag_random_scan: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE (comments NOT LIKE '%otrh scan%' OR comments IS NULL)


  chromox_laser: |
    SELECT image_path
    FROM mmf_dataset_metadata
  yag_laser: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE is_saturated_ground_truth = 0
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 150000
      AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 150000;

  train: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE purpose = 'intensity_position' AND batch IN (9)
    ORDER BY image_path
  eval: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE experiment_description = 'local real beam image for evaluation'
    AND is_saturated_fiber_output = 0

  lab_dmd_orth: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE batch IN (2)
    ORDER BY image_path
  lab_dmd_eval: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE batch IN (3, 5, 6)

  cockcroft_dmd_train: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE is_calibration = 0 and purpose = 'training'
  cockcroft_dmd_eval: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE is_calibration = 0 AND purpose = 'testing' AND comments IS NULL

  processed_chromox_cropped: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE purpose = 'real beam orthogonal acquisition'
      AND is_saturated_ground_truth = 0
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
      AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0;

  processed_chromox_cropped_line_scan: |
    WITH ordered AS (
        SELECT
            image_id,
            image_path,
            ROW_NUMBER() OVER (ORDER BY CAST(image_id AS INTEGER) ASC) - 1 AS rn,
            CAST(json_extract(REPLACE(ground_truth_stats, char(39), '"'), '$.sum') AS REAL) AS gt_sum
        FROM mmf_dataset_metadata
        WHERE purpose = 'real beam orthogonal acquisition'
          AND comments = 'CLEAR beamtime; 10Hz repetition rate; 15 bunches; ND filter 3; '
          AND is_saturated_ground_truth = 0
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
          AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0
    ),
    candidates AS (
        SELECT
            image_id,
            image_path,
            rn,
            CAST(rn / 5 AS INTEGER) AS grp_id,
            (rn % 5) AS pos_in_grp,
            gt_sum
        FROM ordered
        WHERE (rn % 5) IN (2, 3, 4)
          AND gt_sum IS NOT NULL
          AND gt_sum >= 36000
    ),
    paired AS (
        SELECT *
        FROM candidates
        WHERE grp_id IN (
            SELECT grp_id
            FROM candidates
            GROUP BY grp_id
            HAVING COUNT(*) = 3
        )
    ),
    winner AS (
        SELECT
            *,
            ROW_NUMBER() OVER (
                PARTITION BY grp_id
                ORDER BY gt_sum DESC, pos_in_grp DESC
            ) AS pick_rank
        FROM paired
    ),
    final_sorted AS (
        SELECT
            image_id,
            image_path,
            gt_sum,
            grp_id,
            pos_in_grp,
            ROW_NUMBER() OVER (ORDER BY CAST(image_id AS INTEGER) ASC) - 1 AS out_idx
        FROM winner
        WHERE pick_rank = 1
    )
    SELECT
        image_id,
        image_path,
        gt_sum,
        grp_id,
        pos_in_grp
    FROM final_sorted
    WHERE out_idx % (0 + 1) = 0
    ORDER BY CAST(image_id AS INTEGER) ASC;


  processed_chromox_cropped_random_scan_all: |
    -- Full pool for cropped random scan, using the same eligibility rules as eval/train.
    -- Eval = first 500 by shuffle order, Train = remainder.
    WITH ordered AS (
        SELECT
            image_path,
            ROW_NUMBER() OVER (ORDER BY image_path) - 1 AS rn,
            CAST(json_extract(REPLACE(ground_truth_stats, char(39), '"'), '$.sum') AS REAL) AS gt_sum
        FROM mmf_dataset_metadata
        WHERE purpose = 'testset'
          AND is_saturated_ground_truth = 0
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
          AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0
    ),
    filtered AS (
        SELECT
            image_path,
            gt_sum,
            CAST(rn / 5 AS INTEGER) AS grp_id,
            (rn % 5) AS pos_in_grp,
            ROW_NUMBER() OVER (ORDER BY image_path) AS srn
        FROM ordered
        WHERE (rn % 5) IN (4)
          AND gt_sum IS NOT NULL
          AND gt_sum >= 36000
    ),
    ranked AS (
        SELECT
            image_path,
            gt_sum,
            grp_id,
            pos_in_grp,
            ROW_NUMBER() OVER (
                ORDER BY (srn * 2654435761) % 4294967296
            ) AS pick_order
        FROM filtered
    )
    SELECT
        image_path,
        gt_sum,
        grp_id,
        pos_in_grp
    FROM ranked
    ORDER BY pick_order;


  processed_chromox_cropped_random_scan_eval: |
    WITH ordered AS (
        SELECT
            image_path,
            ROW_NUMBER() OVER (ORDER BY image_path) - 1 AS rn,
            CAST(json_extract(REPLACE(ground_truth_stats, char(39), '"'), '$.sum') AS REAL) AS gt_sum
        FROM mmf_dataset_metadata
        WHERE purpose = 'testset'
          AND is_saturated_ground_truth = 0
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
          AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0
    ),
    filtered AS (
        SELECT
            image_path,
            gt_sum,
            CAST(rn / 5 AS INTEGER) AS grp_id,
            (rn % 5) AS pos_in_grp
        FROM ordered
        WHERE (rn % 5) IN (4)
          AND gt_sum IS NOT NULL
          AND gt_sum >= 36000
    )
    SELECT image_path, gt_sum, grp_id, pos_in_grp
    FROM filtered
    ORDER BY (ROW_NUMBER() OVER (ORDER BY image_path) * 2654435761) % 4294967296
    LIMIT 500;


  processed_chromox_cropped_random_scan_train: |
    WITH ordered AS (
        SELECT
            image_path,
            ROW_NUMBER() OVER (ORDER BY image_path) - 1 AS rn,
            CAST(json_extract(REPLACE(ground_truth_stats, char(39), '"'), '$.sum') AS REAL) AS gt_sum
        FROM mmf_dataset_metadata
        WHERE purpose = 'testset'
          AND is_saturated_ground_truth = 0
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
          AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0
    ),
    filtered AS (
        SELECT
            image_path,
            gt_sum,
            CAST(rn / 5 AS INTEGER) AS grp_id,
            (rn % 5) AS pos_in_grp,
            ROW_NUMBER() OVER (ORDER BY image_path) AS srn
        FROM ordered
        WHERE (rn % 5) IN (4)
          AND gt_sum IS NOT NULL
          AND gt_sum >= 36000
    ),
    ranked AS (
        SELECT
            image_path, gt_sum, grp_id, pos_in_grp,
            ROW_NUMBER() OVER (ORDER BY (srn * 2654435761) % 4294967296) AS pick_order
        FROM filtered
    )
    SELECT image_path, gt_sum, grp_id, pos_in_grp
    FROM ranked
    WHERE pick_order > 500
    ORDER BY grp_id, pos_in_grp;


  processed_chromox_random_scan_train: |
    WITH ordered AS (
        SELECT
            image_path,
            ROW_NUMBER() OVER (ORDER BY image_path) - 1 AS rn,
            CAST(json_extract(REPLACE(ground_truth_stats, char(39), '"'), '$.sum') AS REAL) AS gt_sum
        FROM mmf_dataset_metadata
        WHERE purpose = 'testset'
          AND is_saturated_ground_truth = 0
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
          AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0
    ),
    selected AS (
        SELECT
            image_path,
            gt_sum,
            CAST(rn / 5 AS INTEGER) AS grp_id,
            (rn % 5) AS pos_in_grp
        FROM ordered
        WHERE (rn % 5) IN (4)
    ),
    shuffled AS (
        SELECT
            image_path,
            gt_sum,
            grp_id,
            pos_in_grp,
            NTILE(5) OVER (
                ORDER BY ((grp_id * 1103515245 + 12345) % 2147483647), image_path
            ) AS fold_id
        FROM selected
    )
    SELECT
        image_path,
        gt_sum,
        grp_id,
        pos_in_grp
    FROM shuffled
    WHERE fold_id <> 1
    ORDER BY grp_id, pos_in_grp;


  processed_chromox_random_scan_eval: |
    WITH ordered AS (
        SELECT
            image_path,
            ROW_NUMBER() OVER (ORDER BY image_path) - 1 AS rn,
            CAST(json_extract(REPLACE(ground_truth_stats, char(39), '"'), '$.sum') AS REAL) AS gt_sum
        FROM mmf_dataset_metadata
        WHERE purpose = 'testset'
          AND is_saturated_ground_truth = 0
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
          AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
          AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0
    ),
    selected AS (
        SELECT
            image_path,
            gt_sum,
            CAST(rn / 5 AS INTEGER) AS grp_id,
            (rn % 5) AS pos_in_grp
        FROM ordered
        WHERE (rn % 5) IN (4)
    ),
    shuffled AS (
        SELECT
            image_path,
            gt_sum,
            grp_id,
            pos_in_grp,
            NTILE(5) OVER (
                ORDER BY ((grp_id * 1103515245 + 12345) % 2147483647), image_path
            ) AS fold_id
        FROM selected
    )
    SELECT
        image_path,
        gt_sum,
        grp_id,
        pos_in_grp
    FROM shuffled
    WHERE fold_id = 1
    ORDER BY grp_id, pos_in_grp;





dataset_structure:
  db: "/db/dataset_meta.db"                     # Path to the SQLite database containing dataset metadata


data:
  total_train_samples: 4000                     
  train_val_split: 0.8                          # Train/validation split ratio 80/20
  val_test_split: 0.5                           # Validation/test split ratio 50/50
  crop_gt: &crop_gt [[742, 341], [1202, 801]]
  crop_fo: &crop_fo [[360, 0], [1560, 1200]]
  input_shape: &inp [256, 256]                  # Speckle image dimensions [H, W]
  output_shape: &out [256, 256]                 # Input pattern size [H
  transforms:
    torch:
      - name: "torch_load_image"                # Load the image based on file path
      - name: "torch_to_tensor"                 # Convert to tensor
      - name: "torch_remap_range"               # Normalize pixel values to [0,1]               
      - name: "torch_split_width"               # Split image into left/right halves on width
        params:
          swap: True       
      # - name: "multi_transform"                 # normalized the orthogonal basis (but exclude on the val/test set)
      #   params:
      #     transforms:
      #       - name: "identity"                  # Fiber output   
      #       - name: "torch_threshold"           # Ground truth, but should we clip the background noise? since this change the source of truth mapping relation?
      #         params:
      #           threshold: 0.098                # cut off background pixel level to avoid superposition stakcing noise. But not sure if this change the data.   0.098
      #           threshold_value: 0.0
      #           threshold_mode: "below"   
      # - name: "multi_transform"                 # normalized the orthogonal basis (but exclude on the val/test set)
      #   params:
      #     transforms:
      #       - name: "identity"  
      #       - name: "torch_threshold"           # Ground truth, but should we clip the background noise? since this change the source of truth mapping relation?
      #         params:
      #           threshold: 0.95                  # cut off background pixel level to avoid superposition stakcing noise. But not sure if this change the data.   0.098
      #           threshold_value: 0.0
      #           threshold_mode: "above"   

  dataset_ops:                                  # Dataset level operations
    - name: "torch_batch"                       # Batch images
      params:
        batch_size: 32                      # Number of images per batch
        shuffle: True                           # Shuffle dataset
        num_workers: 0                          # Number of worker threads for data loading
        prefetch_factor: 2                      # Number of batches to prefetch
        seed: *seed                             # Random seed for reproducibility



simulation:
  canvas_size: [256, 256]                                                  
  total_Guassian_num: 5                        # SGM total number of Guassian components
  max_intensity: 1                             # Max intensity for each Guassian component
  minimum_pixel_threshold: 10.0                 # Cut off background level, below this value will be set to 0
  fade_rate: 0.5                                # Controls how many active Guassian compoents in a probablistic way
  std_1: 0.015                                  # Guassian std lower bound
  std_2: 0.03                                   # Guassian std upper bound
  distribution: "other" 
  process_functions:                           # before the 
    - name: "remap_range"                      # Normalize pixel values to [0,1]
    - name: "resize"                           # Resize to match input dimensions
      params:
        size: [23, 23]                         # convient for next step (orthognal basis) to decompose the image.
        interpolation: "bilinear"




image_generator:
  transforms:
    - name: "add_parent_dir"                  
      params: 
        parent_dir: null                      # This should be the directory where the images are stored after extraction
    - name: load_image
    - name: to_narray
    - name: to_grayscale
    - name: split_width
      params:
        swap: true
    - name: tuple_select
      params:
        index: 1
    - name: resize
      params:
        size: [22, 22]
    - name: threshold
      params:
        threshold: 10.0
        threshold_value: 0.0
        threshold_mode: below
    - name: remap_range
      params:
        current_min: 0.0
        current_max: 255.0
        target_min: 0.0
        target_max: 1.0



