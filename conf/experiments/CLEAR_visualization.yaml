# ====================
# Conv AutoEncoder fiber image reconstruction configuration file
# ====================

seed: &seed 42                                  # 42, 168, 500
name: &config "CLEAR_visualization.yaml"
framework: "pytorch"
file_extract: False
note: |
  Visualization of dataset latent space.

paths:
  output: ${paths.output_root}                  # Comes from shared defaults
  clear_yag: ${paths.datasets.clear_yag}          # Picked by machine profile
  clear_laser: ${paths.datasets.clear_laser} 
  clear_chromox_wednesday: ${paths.datasets.clear_chromox_wednesday}
  clear_chromox_friday: ${paths.datasets.clear_chromox_friday}
  clear_chromox_saturday: ${paths.datasets.clear_chromox_saturday}
  processed_pure_dmd: ${paths.datasets.processed_pure_dmd}
  processed_dmd: ${paths.datasets.processed_dmd}
  processed_chromox: ${paths.datasets.processed_chromox}
  processed_yag: ${paths.datasets.processed_yag}
  processed_chromox_laser: ${paths.datasets.processed_chromox_laser}
  processed_yag_laser: ${paths.datasets.processed_yag_laser}

model:
  name: "CAE"                             # Factory key for model architecture
  in_channels: 1
  out_channels: 1
  kernel_size: 4
  encoder:          [64,  128, 128, 256, 512, 512]      # 256 -> 128 -> 64 -> 32 -> 16 -> 8
  decoder:          [512, 512, 256, 128, 128, 64 ]
  apply_batchnorm:  [0,   1,   1,   1,   1,   1  ]
  apply_dropout:    [1,   1,   0,   0,   0,   0  ]
  final_activation: sigmoid

simulation:
  canvas_size: [256, 256]                                                  
  total_Guassian_num: 100                       # SGM total number of Guassian components
  max_intensity: 100                                  # Max intensity for each Guassian component
  minimum_pixel_threshold: 10.0                 # Cut off background level, below this value will be set to 0
  fade_rate: 0.98                               # Controls how many active Guassian compoents in a probablistic way
  std_1: 0.015                                  # Guassian std lower bound
  std_2: 0.08                                   # Guassian std upper bound
  distribution: "other" 
  process_functions:                           # before the 
    - name: "remap_range"                      # Normalize pixel values to [0,1]
    - name: "resize"                           # Resize to match input dimensions
      params:
        size: [32, 32]                         # convient for next step (orthognal basis) to decompose the image.
        interpolation: "bilinear"

sql:
  chromox_all: |
    SELECT image_path
    FROM mmf_dataset_metadata
  chromox_line_scan: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE purpose = 'real beam orthogonal acquisition'
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
      AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0;
  chromox_random_scan: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE purpose = 'testset'
      AND is_saturated_ground_truth = 0
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.ground_truth_camera_gain') AS INTEGER) = 0
      AND CAST(json_extract(camera_config, '$.speckle_camera_exposure') AS REAL) = 195000
      AND CAST(json_extract(camera_config, '$.speckle_camera_gain') AS INTEGER) = 0;

  yag_all: |
    SELECT image_path
    FROM mmf_dataset_metadata
  yag_line_scan: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE comments LIKE '%otrh scan%'
  yag_random_scan: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE (comments NOT LIKE '%otrh scan%' OR comments IS NULL)

  chromox_laser: |
    SELECT image_path
    FROM mmf_dataset_metadata
  yag_laser: |
    SELECT image_path
    FROM mmf_dataset_metadata

  train: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE purpose = 'intensity_position' AND batch IN (9)
    ORDER BY image_path
  eval: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE experiment_description = 'local real beam image for evaluation'
    AND is_saturated_fiber_output = 0

  temp_orth: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE batch IN (2)
    ORDER BY image_path
  temp_eval: |
    SELECT image_path
    FROM mmf_dataset_metadata
    WHERE batch IN (3, 5, 6)



data:
  total_train_samples: 4000                     
  train_val_split: 0.8                          # Train/validation split ratio 80/20
  val_test_split: 0.5                           # Validation/test split ratio 50/50
  crop_gt: &crop_gt [[742, 341], [1202, 801]]
  crop_fo: &crop_fo [[360, 0], [1560, 1200]]
  input_shape: &inp [256, 256]                  # Speckle image dimensions [H, W]
  output_shape: &out [256, 256]                 # Input pattern size [H
  transforms:
    torch:
      - name: "torch_load_image"                # Load the image based on file path
      - name: "torch_to_tensor"                 # Convert to tensor
      - name: "torch_remap_range"               # Normalize pixel values to [0,1]               
      - name: "torch_split_width"               # Split image into left/right halves on width
        params:
          swap: True       
      - name: "multi_transform"                 # normalized the orthogonal basis (but exclude on the val/test set)
        params:
          transforms:
            - name: "identity"                  # Fiber output   
            - name: "identity" 

combinator:
  transforms:                               # this is for the output from data augmentation using basis
    torch:
      - name: "multi_transform"                
        params:
          transforms:
            - name: "torch_clip_range"   
              params:
                clip_min: 0
                clip_max: 1
            - name: "torch_clip_range"        
              params:
                clip_min: 0
                clip_max: 1
                